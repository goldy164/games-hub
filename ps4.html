<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل PS4 - اختيار الإصدار - GameHub</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --border: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            flex: 1;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .versions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .version-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: block;
        }

        .version-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .version-card h3 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .version-card p {
            font-size: 0.95rem;
            margin-bottom: 0;
            color: var(--text-muted);
        }

        .badge-stable {
            color: #10b981;
            font-size: 0.9rem;
            display: block;
            margin-top: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شريط التنقل -->
        <nav>
            <a href="index.html" class="logo">🎮 GameHub</a>
            <a href="index.html" class="back-btn">← العودة للرئيسية</a>
        </nav>

        <h1>قسم تعديل الـ PS4</h1>
        <p>اختر إصدار جهازك الحالي لعرض خطوات التعديل والأمان الخاصة به.</p>

        <!-- شبكة اختيار الإصدارات -->
        <div class="versions-grid">
            <!-- إصدار 5.05 (اللي عملناه) -->
            <a href="5.05.html" class="version-card">
                <h3>إصدار 5.05</h3>
                <p>الإصدار الأقوى والأكثر استقراراً في تاريخ التعديل.</p>
                <span class="badge-stable">🟢 مستقر تماماً وموصى به</span>
            </a>

            <!-- مستقبلاً ممكن نضيف إصدارات تانية هنا -->
        </div>
    </div>

    <footer>
        <p>GameHub - منصة تعديل الأجهزة والألعاب</p>
    </footer>

</body>
</html>
